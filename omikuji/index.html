<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドリームダックおみくじ｜今日のあなたのDuck占い</title>
<meta name="description" content="あなたが持っているドリームダックをタップして、今日の運気を引きましょう。1日1回、日替わりの占い体験。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FBF8F1;
    --bg-card: #FFFFFF;
    --ink: #2A2620;
    --ink-soft: #847C70;
    --line: #E8E0CE;
    --gold: #B8965C;
    --gold-soft: #DFC893;
    --accent-soft: #F5EFE0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: "Noto Serif JP", serif; line-height: 1.7; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; padding: 32px 20px 64px; }

  .nav-back {
    max-width: 720px; margin: 0 auto 24px;
    font-family: "Noto Sans JP", sans-serif; font-size: 12px;
    letter-spacing: 0.1em; color: var(--ink-soft);
  }
  .nav-back a { color: var(--ink-soft); text-decoration: none; border-bottom: 1px solid var(--line); padding-bottom: 2px; }
  .nav-back a:hover { color: var(--gold); }

  .hero {
    max-width: 720px; margin: 0 auto 40px; text-align: center;
  }
  .hero-eyebrow {
    font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 14px; letter-spacing: 0.3em; color: var(--gold);
    margin-bottom: 12px; text-transform: uppercase;
  }
  .hero-title {
    font-size: clamp(24px, 5vw, 34px); font-weight: 500;
    letter-spacing: 0.08em; line-height: 1.5; margin-bottom: 16px;
  }
  .hero-sub {
    font-family: "Noto Sans JP", sans-serif; font-size: 13px;
    color: var(--ink-soft); letter-spacing: 0.08em;
  }
  .today {
    margin-top: 16px; font-family: "Cormorant Garamond", serif;
    font-size: 18px; color: var(--gold); letter-spacing: 0.15em;
  }

  /* Grid 13 ducks */
  .grid {
    max-width: 720px; margin: 0 auto;
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  }
  .duck-pick {
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 4px; padding: 12px 10px; cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    text-align: center; position: relative;
  }
  .duck-pick:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(184,150,92,0.18);
    border-color: var(--gold-soft);
  }
  .duck-pick img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover;
    border-radius: 3px; display: block;
  }
  .duck-pick .num {
    position: absolute; top: 6px; left: 8px;
    font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 14px; color: var(--gold);
  }
  .duck-pick .nm {
    margin-top: 8px; font-size: 11px; letter-spacing: 0.05em;
    font-family: "Noto Sans JP", sans-serif;
  }
  .duck-pick.secret .num::after { content: "🔒"; margin-left: 4px; font-size: 10px; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(42,38,32,0.75);
    display: none; align-items: center; justify-content: center;
    padding: 20px; z-index: 100; backdrop-filter: blur(8px);
  }
  .modal-bg.open { display: flex; animation: fadein 0.3s ease; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg-card); border-radius: 8px;
    max-width: 460px; width: 100%; max-height: 90vh; overflow-y: auto;
    padding: 32px 28px; text-align: center; position: relative;
    box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    animation: rise 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }
  .modal-close {
    position: absolute; top: 12px; right: 16px; background: none; border: none;
    font-size: 24px; color: var(--ink-soft); cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: var(--ink); }

  /* Drawing animation */
  .drawing { padding: 60px 20px; text-align: center; }
  .drawing-duck {
    width: 140px; height: 140px; object-fit: cover; border-radius: 50%;
    animation: spin 1.2s ease-in-out;
  }
  @keyframes spin {
    0% { transform: rotate(0) scale(1); }
    50% { transform: rotate(540deg) scale(1.1); }
    100% { transform: rotate(720deg) scale(1); }
  }
  .drawing-msg {
    margin-top: 20px; font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 18px; color: var(--gold); letter-spacing: 0.2em;
  }

  /* Result */
  .result-img {
    width: 120px; height: 120px; object-fit: cover; border-radius: 50%;
    margin: 0 auto 16px; border: 3px solid var(--gold-soft);
    padding: 4px; background: var(--bg-card);
  }
  .result-color {
    font-family: "Noto Sans JP", sans-serif; font-size: 13px;
    color: var(--ink-soft); letter-spacing: 0.1em; margin-bottom: 4px;
  }
  .result-theme {
    font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 13px; color: var(--gold); letter-spacing: 0.3em;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .result-level {
    font-size: 26px; font-weight: 500; letter-spacing: 0.06em;
    margin-bottom: 20px; color: var(--ink);
  }
  .result-msg {
    background: var(--accent-soft); border-radius: 4px;
    padding: 20px 18px; font-size: 15px; line-height: 1.9;
    margin-bottom: 22px; color: var(--ink);
    border-left: 3px solid var(--gold);
    text-align: left;
  }
  .result-details {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin-bottom: 24px;
  }
  .result-detail {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: 4px; padding: 10px 6px; font-size: 11px;
    font-family: "Noto Sans JP", sans-serif;
  }
  .result-detail .label {
    color: var(--ink-soft); letter-spacing: 0.1em; margin-bottom: 6px;
    font-size: 10px;
  }
  .result-detail .value {
    color: var(--ink); font-weight: 500; font-size: 12px;
  }
  .result-match {
    font-family: "Noto Sans JP", sans-serif; font-size: 12px;
    color: var(--ink-soft); margin-bottom: 24px; letter-spacing: 0.05em;
  }
  .result-match strong { color: var(--gold); font-weight: 500; }
  .result-share {
    display: flex; gap: 10px; justify-content: center;
  }
  .btn {
    font-family: "Noto Sans JP", sans-serif; font-size: 12px;
    letter-spacing: 0.15em; padding: 12px 22px;
    border: 1px solid var(--gold); border-radius: 2px;
    background: transparent; color: var(--gold); cursor: pointer;
    transition: background 0.18s, color 0.18s; text-decoration: none;
    display: inline-block;
  }
  .btn:hover { background: var(--gold); color: white; }
  .btn-primary { background: var(--gold); color: white; }
  .btn-primary:hover { background: var(--ink); border-color: var(--ink); }
  .btn-redraw {
    border-color: var(--ink-soft); color: var(--ink-soft);
  }
  .btn-redraw:hover { background: var(--ink-soft); color: white; }
  .redraw-note {
    font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 12px; color: var(--gold); letter-spacing: 0.15em;
    margin-bottom: 18px; padding: 8px 12px;
    background: rgba(184,150,92,0.08); border-radius: 2px;
  }
  .result-share { flex-wrap: wrap; }

  .secret-badge {
    display: inline-block; background: linear-gradient(135deg, #FFE699, #DFC893);
    color: var(--ink); font-size: 10px; padding: 3px 8px; border-radius: 10px;
    letter-spacing: 0.15em; margin-left: 6px; font-family: "Noto Sans JP", sans-serif;
  }

  .foot {
    max-width: 720px; margin: 64px auto 0; text-align: center;
    font-family: "Noto Sans JP", sans-serif; font-size: 10px;
    color: var(--ink-soft); letter-spacing: 0.15em; line-height: 2;
  }

  @media (max-width: 480px) {
    body { padding: 24px 16px 48px; }
    .grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .duck-pick { padding: 10px 8px; }
    .duck-pick .nm { font-size: 10px; }
    .modal { padding: 28px 20px; }
    .result-details { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<nav class="nav-back">
  <a href="../">← カラバリ仕様書へ戻る</a>
</nav>

<div class="hero">
  <div class="hero-eyebrow">Dream Duck Omikuji</div>
  <h1 class="hero-title">今日のあなたの Duck 占い</h1>
  <p class="hero-sub">あなたが持っているドリームダックをタップしてください</p>
  <div class="today" id="today"></div>
</div>

<div class="grid" id="grid"></div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <button class="modal-close" id="modalClose" aria-label="閉じる">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<footer class="foot">
  © Lyric Inc. × MASTAR DESIGN — 占いは日替わりです（毎日 0:00 更新）
</footer>

<script>
(async function() {
  const res = await fetch('fortunes.json');
  const data = await res.json();
  const ducks = data.ducks;

  // Today (JST)
  const now = new Date();
  const jst = new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000);
  const yyyy = jst.getFullYear();
  const mm = String(jst.getMonth() + 1).padStart(2, '0');
  const dd = String(jst.getDate()).padStart(2, '0');
  const dateStr = `${yyyy}-${mm}-${dd}`;
  document.getElementById('today').textContent = `${yyyy}.${mm}.${dd}`;

  // Daily seed hash → fortune index
  function hashSeed(str) {
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return Math.abs(h);
  }

  // Render grid
  const grid = document.getElementById('grid');
  Object.entries(ducks).forEach(([id, d]) => {
    const card = document.createElement('div');
    card.className = 'duck-pick' + (d.secret ? ' secret' : '');
    card.innerHTML = `
      <div class="num">${id}</div>
      <img src="../images/duck_${id}.png" alt="${d.name}">
      <div class="nm">${d.name}</div>
    `;
    card.addEventListener('click', () => showFortune(id, d));
    grid.appendChild(card);
  });

  // Redraw state: session-wide, 1回まで
  let redrawUsed = false;

  // Show fortune
  function showFortune(id, d, opts = {}) {
    const modal = document.getElementById('modal');
    const body = document.getElementById('modalBody');
    modal.classList.add('open');

    // Drawing animation
    body.innerHTML = `
      <div class="drawing">
        <img class="drawing-duck" src="../images/duck_${id}.png" alt="">
        <div class="drawing-msg">${opts.random ? 'Re-drawing...' : 'Drawing...'}</div>
      </div>
    `;

    setTimeout(() => {
      const seedIdx = hashSeed(id + dateStr) % d.fortunes.length;
      let idx;
      if (opts.random) {
        const candidates = d.fortunes.map((_, i) => i).filter(i => i !== seedIdx);
        idx = candidates[Math.floor(Math.random() * candidates.length)];
      } else {
        idx = seedIdx;
      }
      const f = d.fortunes[idx];
      const isSecret = d.secret;
      const showRedrawBtn = !redrawUsed && !opts.random;

      body.innerHTML = `
        <img class="result-img" src="../images/duck_${id}.png" alt="${d.name}">
        <div class="result-color">${d.name}${isSecret ? '<span class="secret-badge">SECRET</span>' : ''}</div>
        <div class="result-theme">${d.luck_theme}</div>
        <div class="result-level">${f.level}</div>
        <div class="result-msg">${f.msg}</div>
        <div class="result-details">
          <div class="result-detail">
            <div class="label">TIME</div>
            <div class="value">${f.time}</div>
          </div>
          <div class="result-detail">
            <div class="label">NUMBER</div>
            <div class="value">${f.num}</div>
          </div>
          <div class="result-detail">
            <div class="label">MATCH</div>
            <div class="value">${f.match}</div>
          </div>
        </div>
        <div class="result-match">今日のあなたと相性がいい色は <strong>${f.match}</strong></div>
        ${opts.random ? '<div class="redraw-note">★ 引き直し結果（このセッション限り）</div>' : ''}
        <div class="result-share">
          ${showRedrawBtn ? '<button class="btn btn-redraw" id="redrawBtn">もう一度引く（残り1回）</button>' : ''}
          <a class="btn" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(`今日の${d.name}ダック占い: ${f.level}\n「${f.msg}」\n#ドリームダック #DreamDuck`)}&url=${encodeURIComponent(location.href)}" target="_blank" rel="noopener">Xでシェア</a>
          <button class="btn btn-primary" id="closeBtn">閉じる</button>
        </div>
      `;
      document.getElementById('closeBtn').addEventListener('click', closeModal);
      if (showRedrawBtn) {
        document.getElementById('redrawBtn').addEventListener('click', () => {
          redrawUsed = true;
          showFortune(id, d, { random: true });
        });
      }
    }, opts.random ? 900 : 1300);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target.id === 'modal') closeModal();
  });
})();
</script>
</body>
</html>
